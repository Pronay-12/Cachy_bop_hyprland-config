# HYPRLAND KEYBINDINGS

#   Variables-Aliases 
$terminal    = kitty
$fileManager = yazi
$menu        = rofi -show drun
$browser     = firefox
$textEditor  = nvim

# Path shortcut for cleaner config
$scripts     = $HOME/user_scripts
$mainMod = SUPER

# Application-Launchers

bindd = $mainMod, T, Launch Terminal, exec,  $terminal
bindd = $mainMod, W, Launch Browser, exec,  $browser
bindd = $mainMod, E, File Manager, exec, $terminal -e $fileManager

# Opacity-Blue-Toggles

bindld = $mainMod SHIFT, period, Toggle Opacity, setprop, activewindow opaque toggle
bindld = $mainMod, period, Toggle Blur, setprop, activewindow no_blur toggle

# Window-Management

bindd = $mainMod, Q, Close Window, killactive,
bindd = $mainMod SHIFT, F, Window Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, V, Toggle Window Split, layoutmsg, togglesplit

# Smart Float: Toggle float -> Resize to 90% -> Center
bindd = $mainMod, F, Toggle Float, exec, if hyprctl -j activewindow | jq -e '.floating | not'; then hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 90% 90%; dispatch centerwindow"; else hyprctl dispatch togglefloating; fi

# Focus-Movement
binded = $mainMod, h, Focus Left, movefocus, l
binded = $mainMod, l, Focus Right, movefocus, r
binded = $mainMod, k, Focus Up, movefocus, u
binded = $mainMod, j, Focus Down, movefocus, d

# Focus-Movement
bind = ALT, H, sendshortcut, ,Left,
bind = ALT, J, sendshortcut, ,Down,
bind = ALT, K, sendshortcut, ,Up,
bind = ALT, L, sendshortcut, ,Right,

# Window-Movement
binded = $mainMod SHIFT, h, Move Left, movewindow, l
binded = $mainMod SHIFT, l, Move Right, movewindow, r
binded = $mainMod SHIFT, k, Move Up, movewindow, u
binded = $mainMod SHIFT, j, Move Down, movewindow, d

# Window-Resizing (Fixed) ---
binded = $mainMod, right, Resize Width +, resizeactive, 30 0
binded = $mainMod, left, Resize Width -, resizeactive, -30 0
binded = $mainMod, up, Resize Height -, resizeactive, 0 -30
binded = $mainMod, down, Resize Height +, resizeactive, 0 30

# Workspace-Management

bindd = $mainMod, 1, Switch To Workspace 1, workspace, 1
bindd = $mainMod, 2, Switch To Workspace 2, workspace, 2
bindd = $mainMod, 3, Switch To Workspace 3, workspace, 3
bindd = $mainMod, 4, Switch To Workspace 4, workspace, 4
bindd = $mainMod, 5, Switch To Workspace 5, workspace, 5
bindd = $mainMod, 6, Switch To Workspace 6, workspace, 6
bindd = $mainMod, 7, Switch To Workspace 7, workspace, 7
bindd = $mainMod, 8, Switch To Workspace 8, workspace, 8
bindd = $mainMod, 9, Switch To Workspace 9, workspace, 9
bindd = $mainMod, 0, Switch To Workspace 10, workspace, 10

bindd = $mainMod SHIFT, 1, Move To Workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move To Workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move To Workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move To Workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move To Workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move To Workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move To Workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move To Workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move To Workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move To Workspace 10, movetoworkspace, 10

# Special Workspace (Scratchpad)
bindd = $mainMod, Z, Toggle Scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, Z, Move to Scratchpad, movetoworkspace, special:magic

# Mouse-Useage

binddm = $mainMod, mouse:272, Move Window, movewindow
binddm = $mainMod SHIFT, mouse:272, Resize Window, resizewindow


# Noctalia-Shell

$ipc = qs -c noctalia-shell ipc call

bind = SUPER, SPACE, exec, $ipc launcher toggle
bind = SUPER, N, exec, $ipc controlCenter toggle
bind = SUPER, comma, exec, $ipc settings toggle
bind = SUPER, V, exec, $ipc launcher clipboard
bind = SUPER, M, exec, $ipc media toggle
bind = SUPER, I, exec, $ipc network togglePanel
bind = SUPER, B, exec, $ipc bluetooth togglePanel
bind = SUPER, X, exec, $ipc lockScreen lock
bind = SUPER, O, exec, $ipc wallpaper toggle

bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

bindld = , XF86AudioNext, Next track, exec, $ipc media next
bindld = , XF86AudioPause, Pause, exec, $ipc media pause
bindld = , XF86AudioPlay, Play, exec, $ipc meadia play
bindld = , XF86AudioPrev, Previous track, exec, $ipc media previous
